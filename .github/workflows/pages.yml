name: Deploy docs & Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`) so platform-specific optional native deps
      # (lightningcss / @tailwindcss/oxide) resolve for the Linux runner even
      # though the lockfile was generated on another OS.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build library
        run: npm run build:lib

      - name: Build Storybook
        run: npm run build:storybook

      # Project Pages are served from /<repo>, so prefix the docs assets.
      # For a user/org site (user.github.io) or a custom domain, set this to "".
      - name: Build docs (static export)
        run: npm run build:docs
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Assemble site (docs at /, Storybook at /storybook)
        run: |
          rm -rf _site
          mkdir -p _site/storybook
          cp -r apps/docs/out/. _site/
          cp -r packages/ui/storybook-static/. _site/storybook/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
